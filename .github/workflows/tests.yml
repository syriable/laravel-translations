name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pest:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['12.*']

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

  ai-integration:
    runs-on: ubuntu-latest

    name: AI integration (laravel/ai)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies with the AI SDK
        run: |
          composer require "laravel/framework:^12.0" "laravel/ai:^0.1" --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Assert AI classes compile against the SDK
        run: >
          php -r "require 'vendor/autoload.php';
          exit(class_exists(Syriable\Translations\Ai\AiTranslator::class)
          && class_exists(Syriable\Translations\Ai\PhraseTranslationAgent::class) ? 0 : 1);"

      - name: Run tests
        run: vendor/bin/pest
